name: Deploy SQL Agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --ssh

      - name: Wait for network
        run: sleep 10

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.90.162.48
          username: vicky
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Navigating to project..."
            cd ~/vscode_storage/sql_chatbot/web

            echo "Pulling latest code..."
            git -C .. pull origin main

            echo "Stopping containers..."
            /usr/bin/docker compose down --remove-orphans || true

            echo "Building and starting containers..."
            if ! /usr/bin/docker compose up -d --build --remove-orphans; then
              echo "docker compose failed. Container status:"
              /usr/bin/docker compose ps
              echo "sql-agent-web logs:"
              /usr/bin/docker compose logs --tail=100 sql-agent-web
              exit 1
            fi

            echo "Waiting for services..."
            sleep 20

            echo "Container status:"
            /usr/bin/docker compose ps

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment completed successfully!"
