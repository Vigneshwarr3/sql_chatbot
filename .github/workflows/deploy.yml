name: Deploy

on:
  push:
    branches: [main]

# ── Secrets required (3 total) ────────────────────────────────────────────────
#
#  TS_OAUTH_CLIENT_ID      Tailscale OAuth client ID
#  TS_OAUTH_CLIENT_SECRET  Tailscale OAuth client secret
#                          Create at: tailscale.com/admin/settings/oauth
#
#  SSH_PRIVATE_KEY         Your SSH private key (run: cat ~/.ssh/id_rsa)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Pull latest code and rebuild
        uses: appleboy/ssh-action@v1
        with:
          host: 100.90.162.48
          username: vicky
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/vscode_storage/sql_chatbot/web

            # Pull latest changes
            git -C .. pull

            # Rebuild image and restart container
            docker compose up -d --build

            # Clean up old dangling images
            docker image prune -f
